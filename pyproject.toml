[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "my-auth"
version = "0.1.0"
description = "Minimal reusable passkey helpers for Python web apps"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Mikolaj" }]
dependencies = [
  "webauthn>=2.2,<3",
]

[dependency-groups]
dev = [
  "pytest>=8",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/my_auth"]
