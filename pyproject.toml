[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "my-auth"
version = "0.1.0"
description = "Minimal reusable passkey helpers for Python web apps"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Mikolaj" }]
dependencies = [
  "webauthn>=2.2,<3",
]

[project.optional-dependencies]
fastapi = ["fastapi>=0.115"]
fastapi-htmx = [
  "fastapi>=0.115",
  "jinja2>=3.1",
  # Shared Basecoat chrome (git pin — no local path)
  "app-factory @ git+https://github.com/mikolaj92/app-factory@v0.1.0",
]

[dependency-groups]
dev = [
  "fastapi>=0.115",
  "httpx>=0.27",
  "jinja2>=3.1",
  "app-factory @ git+https://github.com/mikolaj92/app-factory@v0.1.0",
  "pytest>=8",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/my_auth"]
